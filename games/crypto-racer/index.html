<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Web3 Highway - Kenney Edition</title>
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #ffb800;
            --danger: #ff3366;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --border-glass: rgba(255, 255, 255, 0.5);
            --text-dark: #1a1a24;
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #4fc3f7; 
            color: var(--text-dark); 
            user-select: none;
            -webkit-user-select: none; 
            -webkit-touch-callout: none; 
            touch-action: none; 
        }
        
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Layar Sentuh Pembagi (Kiri & Kanan) */
        #touch-left, #touch-right {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            z-index: 5;
            display: none;
        }
        #touch-left { left: 0; }
        #touch-right { right: 0; }

        /* UI Overlays */
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 20; transition: opacity 0.4s ease; 
        }
        
        /* Menu Utama (Showroom Transparan) */
        .menu-bg {
            background: linear-gradient(to bottom, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.2) 35%, rgba(255,255,255,0) 100%);
            backdrop-filter: none;
            justify-content: space-between; /* Pisahkan atas dan bawah */
            padding: 10vh 0 12vh 0;
            box-sizing: border-box;
        }
        .menu-header { text-align: center; }
        .menu-bottom { display: flex; flex-direction: column; align-items: center; width: 100%; z-index: 30;}

        /* Game Over Menu (Background Blur) */
        #game-over {
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(180,215,255,0.95) 100%);
            backdrop-filter: blur(8px);
        }

        .hidden { opacity: 0; pointer-events: none; }
        
        h1 { font-size: 3.5rem; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 2px; color: #0077ff; text-align: center; text-shadow: 0 4px 10px rgba(0, 119, 255, 0.2);}
        p.subtitle { font-size: 1.1rem; color: #555; margin-bottom: 25px; font-weight: 600; text-align: center; padding: 0 20px;}
        
        /* CAR SELECTOR UI */
        #car-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 85%;
            max-width: 340px;
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid rgba(0, 119, 255, 0.5);
            border-radius: 50px;
            padding: 8px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
        }
        .car-btn {
            background: linear-gradient(135deg, #0077ff, #00d2ff);
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0, 119, 255, 0.3);
        }
        .car-btn:hover { transform: scale(1.08); }
        .car-btn:active { transform: scale(0.92); }
        #selected-car-name {
            font-weight: 900;
            color: #005bb5;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            flex-grow: 1;
        }

        button.btn-main { 
            padding: 16px 45px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; 
            color: #fff; background: linear-gradient(135deg, #0077ff, #00d2ff); border: none; border-radius: 50px; 
            cursor: pointer; transition: all 0.2s ease; box-shadow: 0 6px 20px rgba(0, 119, 255, 0.4); 
        }
        button.btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 119, 255, 0.5); }
        button.btn-main:active { transform: translateY(1px); }

        /* HUD */
        #hud { 
            position: absolute; top: 15px; left: 15px; z-index: 10; display: none; 
            background: var(--bg-glass); padding: 12px 20px; border-radius: 12px; 
            border: 1px solid var(--border-glass); border-left: 5px solid var(--primary);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); backdrop-filter: blur(5px);
            pointer-events: none;
        }
        .hud-stat { font-size: 1.2rem; font-weight: 800; margin: 4px 0; display: flex; justify-content: space-between; width: 160px;}
        .stat-label { color: #555; font-weight: 700; font-size: 0.9rem; align-self: center; text-transform: uppercase;}
        #val-score { color: var(--accent); }
        #val-speed { color: var(--primary); }

        /* IN-GAME INSTRUCTIONS */
        #in-game-instructions {
            position: absolute; top: 25%; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(5px);
            color: white; padding: 20px 30px; border-radius: 15px;
            text-align: center; z-index: 15; pointer-events: none;
            display: none; transition: opacity 0.8s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1); min-width: 250px;
        }
        #in-game-instructions h3 { margin: 0 0 10px 0; color: #00d2ff; letter-spacing: 1px; font-size: 1.3rem;}
        #in-game-instructions p { margin: 8px 0; font-size: 1rem; font-weight: 500; }
        .alert-text { color: var(--danger); font-weight: 800; margin-top: 15px !important; letter-spacing: 1px;}

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            #hud { top: 10px; left: 10px; padding: 10px 15px; }
            .hud-stat { width: 130px; font-size: 1rem; }
            #in-game-instructions { width: 80%; padding: 15px; }
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="touch-left"></div>
    <div id="touch-right"></div>

    <!-- Main Menu -->
    <div id="main-menu" class="overlay menu-bg">
        <div class="menu-header">
            <h1>CRYPTO RACER JAY</h1>
            <p class="subtitle">SURVIVE. MINE DISTANCE.</p>
        </div>
        <div class="menu-bottom">
            <div id="car-selector">
                <button id="btn-prev-car" class="car-btn">◄</button>
                <div id="selected-car-name">SEDAN SPORTS</div>
                <button id="btn-next-car" class="car-btn">►</button>
            </div>
            <button id="start-btn" class="btn-main">START ENGINE</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over" class="overlay hidden">
        <h1 style="color: var(--danger);">CRASHED!</h1>
        <p class="subtitle" id="final-stats">Distance Mined: 0 M</p>
        <button id="restart-btn" class="btn-main">TRY AGAIN</button>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div class="hud-stat"><span class="stat-label">DISTANCE</span> <span id="val-score">0</span></div>
        <div class="hud-stat"><span class="stat-label">SPEED</span> <span id="val-speed">0</span> KM/H</div>
    </div>

    <!-- Instructions -->
    <div id="in-game-instructions">
        <h3>HOW TO PLAY</h3>
        <p>📱 <b>TAP </b> Left/Right</p>
        <p>💻 <b>ARROW KEYS</b> or <b>A / D</b></p>
        <p class="alert-text">AVOID THE TRAFFIC!</p>
    </div>

    <div id="game-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const gameState = {
            isRunning: false,
            score: 0,
            speed: 40,         
            maxSpeed: 160,     
            acceleration: 2.5, 
            steeringSpeed: 20, 
            laneLimits: 7      
        };

        const input = { left: false, right: false };
        let instTimeout; 

        const elScore = document.getElementById('val-score');
        const elSpeed = document.getElementById('val-speed');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x4fc3f7); 
        scene.fog = new THREE.Fog(0x4fc3f7, 30, 150); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 3, 7); 
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('game-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 512;
        dirLight.shadow.mapSize.height = 512;
        scene.add(dirLight);

        const CACHE = {
            geo: {
                carHitbox: new THREE.BoxGeometry(1.6, 1.2, 3.5), 
                road: new THREE.PlaneGeometry(20, 300),
                grass: new THREE.PlaneGeometry(200, 300),
                stripe: new THREE.PlaneGeometry(0.4, 4),
                treeTrunk: new THREE.CylinderGeometry(0.4, 0.4, 2, 6),
                treeLeaves: new THREE.ConeGeometry(2, 4, 6)
            },
            mat: {
                invisible: new THREE.MeshBasicMaterial({ visible: false }), 
                road: new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 }),
                grass: new THREE.MeshStandardMaterial({ color: 0x7cb342, roughness: 1.0 }),
                stripe: new THREE.MeshBasicMaterial({ color: 0xffffff }),
                wood: new THREE.MeshStandardMaterial({ color: 0x5d4037 }),
                leaf: new THREE.MeshStandardMaterial({ color: 0x2e7d32 })
            }
        };

        const loader = new GLTFLoader();

        // ==========================================
        // 1. SISTEM ANTREAN LOAD (MENCEGAH CRASH OOM)
        // ==========================================
        const loadQueue = [];
        let isLoadingAsset = false;

        function processQueue() {
            if (loadQueue.length === 0) {
                isLoadingAsset = false;
                return;
            }
            isLoadingAsset = true;
            const task = loadQueue.shift();

            loader.load(
                task.file, 
                (gltf) => {
                    task.onSuccess(gltf);
                    processQueue(); // Lanjut ke antrean berikutnya setelah sukses
                },
                undefined,
                (err) => {
                    console.warn(`Fallback procedural digunakan untuk ${task.file}`);
                    processQueue(); // Lanjut meskipun gagal
                }
            );
        }

        function queueGltfLoad(file, onSuccess) {
            loadQueue.push({ file, onSuccess });
            if (!isLoadingAsset) processQueue();
        }

        function buildProceduralCar(colorHex) {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.5 });
            const glassMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.1 });
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });

            const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.6, 3.4), bodyMat);
            body.position.y = 0.5; body.castShadow = true; body.receiveShadow = true;
            group.add(body);

            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.8), glassMat);
            cabin.position.set(0, 1.0, -0.2); cabin.castShadow = true; cabin.receiveShadow = true;
            group.add(cabin);

            const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.4, 16);
            wheelGeo.rotateZ(Math.PI / 2);
            [[-0.8, 0.35, 1.0], [0.8, 0.35, 1.0], [-0.8, 0.35, -1.0], [0.8, 0.35, -1.0]].forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.position.set(...pos); wheel.castShadow = true;
                group.add(wheel);
            });
            return group;
        }

        const playerCar = new THREE.Group();
        const pBody = new THREE.Mesh(CACHE.geo.carHitbox, CACHE.mat.invisible);
        pBody.position.y = 0.6;
        playerCar.add(pBody);
        
        const playerVisuals = new THREE.Group();
        playerCar.add(playerVisuals);
        scene.add(playerCar);
        const playerBox = new THREE.Box3();

        const selectableCars = [
            { name: "SEDAN SPORTS", file: "sedan-sports.glb", color: 0x00d2ff },
            { name: "LUXURY SUV", file: "suv-luxury.glb", color: 0x888888 },
            { name: "TAXI CAB", file: "taxi.glb", color: 0xffcc00 },
            { name: "POLICE CRUISER", file: "police.glb", color: 0x0022ff },
            { name: "FLATBED TRUCK", file: "truck-flat.glb", color: 0x229922 }
        ];
        const preloadedPlayerCars = {};
        let selectedCarIndex = 0;
        const elSelectedCarName = document.getElementById('selected-car-name');

        function updateMenuCarModel() {
            playerVisuals.clear();
            const selectedFileName = selectableCars[selectedCarIndex].file;
            if (preloadedPlayerCars[selectedFileName]) {
                playerVisuals.add(preloadedPlayerCars[selectedFileName].clone());
            }
        }

        document.getElementById('btn-prev-car').addEventListener('click', () => {
            selectedCarIndex = (selectedCarIndex - 1 + selectableCars.length) % selectableCars.length;
            elSelectedCarName.innerText = selectableCars[selectedCarIndex].name;
            updateMenuCarModel();
        });
        document.getElementById('btn-next-car').addEventListener('click', () => {
            selectedCarIndex = (selectedCarIndex + 1) % selectableCars.length;
            elSelectedCarName.innerText = selectableCars[selectedCarIndex].name;
            updateMenuCarModel();
        });

        selectableCars.forEach(car => {
            preloadedPlayerCars[car.file] = buildProceduralCar(car.color);
            if (selectableCars[selectedCarIndex].file === car.file) updateMenuCarModel();

            // Gunakan Queue Loader agar tidak membuat GPU kewalahan
            queueGltfLoad(car.file, (gltf) => {
                const model = gltf.scene;
                model.scale.set(1.5, 1.5, 1.5); 
                model.rotation.y = Math.PI;     
                model.traverse((child) => {
                    if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
                });
                preloadedPlayerCars[car.file] = model;
                if (selectableCars[selectedCarIndex].file === car.file) updateMenuCarModel();
            });
        });

        const grass = new THREE.Mesh(CACHE.geo.grass, CACHE.mat.grass);
        grass.rotation.x = -Math.PI / 2; grass.position.z = -100; grass.receiveShadow = true;
        scene.add(grass);

        const road = new THREE.Mesh(CACHE.geo.road, CACHE.mat.road);
        road.rotation.x = -Math.PI / 2; road.position.set(0, 0.01, -100); road.receiveShadow = true;
        scene.add(road);

        const stripes = [];
        for (let i = 0; i < 20; i++) {
            const stripe = new THREE.Mesh(CACHE.geo.stripe, CACHE.mat.stripe);
            stripe.rotation.x = -Math.PI / 2; stripe.position.set(0, 0.02, -i * 10);
            scene.add(stripe); stripes.push(stripe);
        }

        const trees = [];
        const treeProceduralGroup = new THREE.Group();
        const trunkMesh = new THREE.Mesh(CACHE.geo.treeTrunk, CACHE.mat.wood);
        trunkMesh.position.y = 1; trunkMesh.castShadow = true;
        const leavesMesh = new THREE.Mesh(CACHE.geo.treeLeaves, CACHE.mat.leaf);
        leavesMesh.position.y = 3; leavesMesh.castShadow = true;
        treeProceduralGroup.add(trunkMesh, leavesMesh);

        for (let i = 0; i < 30; i++) {
            const treeGroup = new THREE.Group();
            const zPos = -Math.random() * 200;
            const xPos = (Math.random() > 0.5 ? 1 : -1) * (12 + Math.random() * 15);
            treeGroup.position.set(xPos, 0, zPos);
            treeGroup.add(treeProceduralGroup.clone());
            scene.add(treeGroup);
            trees.push(treeGroup);
        }

        queueGltfLoad('tree.glb', (gltf) => {
            const treeTemplate = gltf.scene;
            treeTemplate.scale.set(1.5, 1.5, 1.5);
            treeTemplate.traverse((child) => {
                if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
            });
            trees.forEach(t => { t.clear(); t.add(treeTemplate.clone()); });
        });

        const traffic = [];
        const loadedTrafficModels = [
            buildProceduralCar(0xff3366), buildProceduralCar(0xff9900),
            buildProceduralCar(0x33cc33), buildProceduralCar(0xcc33cc) 
        ];

        const trafficFiles = [
            'van.glb', 'taxi.glb', 'police.glb', 'truck.glb', 'suv.glb', 
            'delivery-flat.glb', 'ambulance.glb', 'delivery.glb', 
            'firetruck.glb', 'garbage-truck.glb', 'sedan-sports.glb', 
            'suv-luxury.glb', 'truck-flat.glb'
        ];
        
        trafficFiles.forEach(file => {
            queueGltfLoad(file, (gltf) => {
                const model = gltf.scene;
                model.scale.set(1.5, 1.5, 1.5);
                model.rotation.y = Math.PI; 
                model.traverse((child) => {
                    if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
                });
                loadedTrafficModels.push(model);
            });
        });

        function spawnTrafficCar() {
            const tCar = new THREE.Group();
            const hitbox = new THREE.Mesh(CACHE.geo.carHitbox, CACHE.mat.invisible);
            hitbox.position.y = 0.6;
            tCar.add(hitbox);

            const visualContainer = new THREE.Group();
            const randomModel = loadedTrafficModels[Math.floor(Math.random() * loadedTrafficModels.length)].clone();
            visualContainer.add(randomModel);
            tCar.add(visualContainer);

            tCar.position.set((Math.random() * (gameState.laneLimits * 2)) - gameState.laneLimits, 0, -150 - (Math.random() * 50));
            tCar.userData = { speed: 30 + Math.random() * 20, box: new THREE.Box3() };

            scene.add(tCar);
            traffic.push(tCar);
        }
        for(let i=0; i<6; i++) spawnTrafficCar();

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') input.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd') input.right = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') input.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd') input.right = false;
        });

        const setupTouchZone = (id, key) => {
            const zone = document.getElementById(id);
            const press = (e) => { e.preventDefault(); input[key] = true; };
            const release = (e) => { e.preventDefault(); input[key] = false; };
            zone.addEventListener('touchstart', press, { passive: false });
            zone.addEventListener('touchend', release, { passive: false });
            zone.addEventListener('touchcancel', release, { passive: false });
        };
        setupTouchZone('touch-left', 'left');
        setupTouchZone('touch-right', 'right');

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        
        // 2. OPTIMASI MEMORI DALAM LOOP: Cukup gunakan 1 variabel Vector3 secara global
        const tempSize = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1); 

            if (gameState.isRunning) {
                if (gameState.speed < gameState.maxSpeed) {
                    gameState.speed += gameState.acceleration * delta;
                    gameState.speed = Math.min(gameState.speed, gameState.maxSpeed);
                }

                gameState.score += (gameState.speed * delta) * 0.1;
                elScore.innerText = Math.floor(gameState.score);
                elSpeed.innerText = Math.floor(gameState.speed);

                let steerAngle = 0;
                if (input.left && playerCar.position.x > -gameState.laneLimits) {
                    playerCar.position.x -= gameState.steeringSpeed * delta; steerAngle = 0.2; 
                }
                if (input.right && playerCar.position.x < gameState.laneLimits) {
                    playerCar.position.x += gameState.steeringSpeed * delta; steerAngle = -0.2;
                }
                
                playerCar.rotation.z = THREE.MathUtils.lerp(playerCar.rotation.z, steerAngle, delta * 12);
                playerCar.rotation.y = THREE.MathUtils.lerp(playerCar.rotation.y, steerAngle * 1.5, delta * 12);

                playerBox.setFromObject(playerCar);
                if (!playerBox.isEmpty()) {
                    playerBox.getSize(tempSize);
                    playerBox.expandByVector(tempSize.multiplyScalar(-0.1)); 
                }

                const moveDist = gameState.speed * delta;

                stripes.forEach(stripe => {
                    stripe.position.z += moveDist;
                    if (stripe.position.z > 10) stripe.position.z -= 200; 
                });

                trees.forEach(tree => {
                    tree.position.z += moveDist;
                    if (tree.position.z > 10) {
                        tree.position.z -= 200;
                        tree.position.x = (Math.random() > 0.5 ? 1 : -1) * (12 + Math.random() * 15);
                    }
                });

                for (let i = 0; i < traffic.length; i++) {
                    const tCar = traffic[i];
                    const relativeSpeed = gameState.speed - tCar.userData.speed;
                    tCar.position.z += relativeSpeed * delta;

                    tCar.userData.box.setFromObject(tCar);
                    if (!tCar.userData.box.isEmpty()) {
                        tCar.userData.box.getSize(tempSize);
                        tCar.userData.box.expandByVector(tempSize.multiplyScalar(-0.15));
                    }

                    if (playerBox.intersectsBox(tCar.userData.box)) {
                        triggerGameOver();
                        return; 
                    }

                    if (tCar.position.z > 15) {
                        tCar.position.z = -150 - (Math.random() * 100);
                        tCar.position.x = (Math.random() * (gameState.laneLimits * 2)) - gameState.laneLimits;
                        tCar.userData.speed = 30 + Math.random() * 20; 
                        
                        tCar.children[1].clear(); 
                        const newModel = loadedTrafficModels[Math.floor(Math.random() * loadedTrafficModels.length)].clone();
                        tCar.children[1].add(newModel);
                    }
                }
                
                const targetCamX = playerCar.position.x * 0.75; 
                camera.position.x = THREE.MathUtils.lerp(camera.position.x, targetCamX, delta * 4);
                camera.lookAt(THREE.MathUtils.lerp(0, playerCar.position.x, 0.4), 0, -20);
                
                const shake = (gameState.speed / gameState.maxSpeed) * 0.015; 
                camera.position.y = 4 + Math.cos(clock.elapsedTime * 15) * shake;
                camera.position.x += Math.sin(clock.elapsedTime * 20) * shake;

            } else {
                playerCar.rotation.y += delta * 0.5; 
                camera.position.lerp(new THREE.Vector3(0, 3, 7), delta * 2);
                camera.lookAt(0, 1, 0);

                const menuMoveDist = 15 * delta;
                stripes.forEach(stripe => {
                    stripe.position.z += menuMoveDist;
                    if (stripe.position.z > 10) stripe.position.z -= 200; 
                });
                trees.forEach(tree => {
                    tree.position.z += menuMoveDist;
                    if (tree.position.z > 10) {
                        tree.position.z -= 200;
                        tree.position.x = (Math.random() > 0.5 ? 1 : -1) * (12 + Math.random() * 15);
                    }
                });
            }

            renderer.render(scene, camera);
        }

        function triggerGameOver() {
            gameState.isRunning = false;
            document.getElementById('hud').style.display = 'none';
            document.getElementById('touch-left').style.display = 'none';
            document.getElementById('touch-right').style.display = 'none';
            
            playerCar.position.set(0, 0, 0);
            document.getElementById('final-stats').innerText = `Distance Mined: ${Math.floor(gameState.score)} M`;
            document.getElementById('game-over').classList.remove('hidden');
        }

        function startGame() {
            updateMenuCarModel(); 
            playerCar.position.set(0, 0, 0);
            playerCar.rotation.set(0, 0, 0); 
            input.left = false; input.right = false;

            traffic.forEach(tCar => {
                tCar.position.z = -100 - (Math.random() * 150);
                tCar.position.x = (Math.random() * (gameState.laneLimits * 2)) - gameState.laneLimits;
            });

            gameState.score = 0; gameState.speed = 40; gameState.isRunning = true;
            elScore.innerText = "0"; elSpeed.innerText = "40";

            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('hud').style.display = 'block';
            document.getElementById('touch-left').style.display = 'block';
            document.getElementById('touch-right').style.display = 'block';

            const instructions = document.getElementById('in-game-instructions');
            instructions.style.display = 'block';
            setTimeout(() => { instructions.style.opacity = '1'; }, 50);

            if (instTimeout) clearTimeout(instTimeout);
            instTimeout = setTimeout(() => {
                instructions.style.opacity = '0'; 
                setTimeout(() => { instructions.style.display = 'none'; }, 800); 
            }, 4000); 
        }

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
        });

        animate();
    </script>
</body>
</html>
